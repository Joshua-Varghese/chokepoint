name: Deploy MQTT Bridge to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - '.github/workflows/deploy_mqtt_bridge.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SERVICE_ACCOUNT_BASE64,MQTT_URL,MQTT_USERNAME,MQTT_PASSWORD
          script: |
            set -e

            # 0. Install Node.js if missing
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # 1. Pull latest code (clone if first time)
            cd /home/ubuntu
            if [ ! -d "chokepoint" ]; then
              git clone https://github.com/Joshua-Varghese/chokepoint.git
              cd chokepoint
            else
              cd chokepoint
              git pull origin main
            fi

            # 2. Restore Firebase service account from secret
            echo "$SERVICE_ACCOUNT_BASE64" | base64 --decode > scripts/service-account.json

            # 3. Write .env file with MQTT credentials
            cat > scripts/.env << EOF
            MQTT_URL=mqtt://puffin.rmq2.cloudamqp.com:1883
            MQTT_USERNAME=$MQTT_USERNAME
            MQTT_PASSWORD=$MQTT_PASSWORD
            EOF

            # 4. Install dependencies
            cd scripts
            npm install --omit=dev

            # 5. Install / refresh the systemd unit file
            sudo cp mqtt-bridge.service /etc/systemd/system/mqtt-bridge.service
            sudo systemctl daemon-reload
            sudo systemctl enable mqtt-bridge

            # 6. Restart the service
            sudo systemctl restart mqtt-bridge

            # 7. Confirm it's running
            sleep 3
            sudo systemctl is-active --quiet mqtt-bridge && echo "✅ mqtt-bridge is running" || (echo "❌ mqtt-bridge failed to start" && sudo journalctl -u mqtt-bridge --no-pager -n 20 && exit 1)
